services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snorquel
      POSTGRES_USER: snorquel
      POSTGRES_PASSWORD: snorquel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snorquel -d snorquel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: oven/bun:1.2.15
    working_dir: /app
    command: sh -c "bun install && bun run dev:api"
    environment:
      DATABASE_URL: postgresql://snorquel:snorquel@db:5432/snorquel
      API_PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - bun_cache:/root/.bun/install/cache
    depends_on:
      db:
        condition: service_healthy

  web:
    image: oven/bun:1.2.15
    working_dir: /app
    command: sh -c "bun install && bun run dev:web"
    environment:
      VITE_API_PROXY: http://api:3001
    ports:
      - "5124:5124"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - bun_cache:/root/.bun/install/cache
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
  bun_cache:
